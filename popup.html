<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XML to PDF</title>
    <link rel="stylesheet" href="./lib/fontawesome/css/all.min.css">
    <style>
        :root {
            --primary: #c10034;
            --primary-hover: #a3002d;
            --bg: #f2f4f8;
            --surface: #ffffff;
            --text: #1f2a37;
            --text-light: #5f6c7b;
            --border: #d8dee6;
            --success: #1a9a68;
            --hover: #edf1f6;
        }

        :root[data-theme="dark"] {
            --primary: #e11d48;
            --primary-hover: #f0758e;
            --bg: #131a22;
            --surface: #1b2530;
            --text: #eef1f5;
            --text-light: #b8c2cf;
            --border: #2b3a4b;
            --hover: #223141;
            --success: #2fb07a;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-width: 460px;
            width: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 16px;
            transition: background 0.3s, color 0.3s;
        }


        .top-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 6px;
        }

        .settings-btn {
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 11px;
            font-weight: 600;
            padding: 6px 10px;
            border-radius: 999px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, border 0.2s;
        }
        .settings-btn:hover {
            background: var(--hover);
            border-color: var(--primary);
            color: var(--text);
        }
        .settings-btn:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
        .brand-logo { width: 32px; height: 32px; border-radius: 8px; }
        .header-content { min-width: 0; }
        .header-content h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.2;
        }
        .subtitle { font-size: 12px; color: var(--text-light); margin-top: 2px; line-height: 1.35; }

        .privacy-note {
            font-size: 12px;
            color: var(--text-light);
            margin: 0 0 12px 0;
            line-height: 1.4;
        }

        .setting-group-title {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 24px 0 8px 0;
        }
        .setting-group-title:first-child { margin-top: 4px; }

        .settings-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transform: translateY(-8px);
            transition: max-height 0.25s ease, opacity 0.25s ease, transform 0.25s ease, padding 0.25s ease;
            padding: 0 12px;
            margin-bottom: 0;
            pointer-events: none;
        }
        .settings-panel.open {
            max-height: 520px;
            opacity: 1;
            transform: translateY(0);
            padding: 12px;
            margin-bottom: 12px;
            pointer-events: auto;
        }

        .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }
        .setting-item:last-child { border-bottom: none; }

        .setting-label {
            font-size: 12px;
            font-weight: 600;
        }

        .toggle-pill {
            border: 1px solid var(--border);
            background: var(--hover);
            color: var(--text);
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 999px;
            cursor: pointer;
            transition: background 0.2s, border 0.2s, color 0.2s;
            min-width: fit-content;
            width: 120px;
            text-align: center;
        }
        .toggle-pill:hover { border-color: var(--primary); }
        .toggle-pill:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        .setting-stack {
            flex-direction: column;
            align-items: stretch;
        }

        .setting-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            width: 100%;
        }

        .setting-value {
            font-size: 11px;
            color: var(--text-light);
        }

        .range-input {
            width: 100%;
            accent-color: var(--primary);
        }

        .color-input {
            width: 44px;
            height: 28px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            padding: 0;
            width: 120px;
        }

        .logo-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-preview {
            width: 32px;
            height: 32px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .logo-preview img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .logo-preview.hidden { display: none; }

        .ghost-btn {
            border: none;
            background: none;
            color: var(--text-light);
            font-size: 11px;
            cursor: pointer;
        }
        .ghost-btn:hover { color: var(--text); }

        #upload-zone {
            background: var(--surface);
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 32px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        #upload-zone:hover, #upload-zone.dragover {
            border-color: var(--primary);
            background-color: var(--bg); /* slight contrast */
        }

        .icon-upload { font-size: 36px; color: var(--text-light); }
        .upload-text { font-size: 13px; font-weight: 600; }
        .upload-hint { font-size: 11px; color: var(--text-light); }

        input[type="file"] { display: none; }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0 8px 0;
        }

        .section-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-light);
        }

        .file-list {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow-y: auto;
            max-height: 60vh;
        }

        .file-item {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            font-size: 13px;
            background: var(--surface);
            transition: background 0.2s;
        }

        .file-item:last-child { border-bottom: none; }
        .file-item:hover { background-color: var(--hover); }
        .file-item.selectable { cursor: pointer; }
        .file-item.selected {
            background-color: var(--hover);
            border-left: 1px solid var(--primary);
        }

        .file-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 2px;
            width: 100%;
        }

        .file-line {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
        }
        .file-icon {
            font-size: 11px;
            color: var(--text-light);
        }
        .file-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600; }
        .file-sub { font-size: 11px; color: var(--text-light); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .file-extra {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            font-size: 12px;
            color: var(--text);
            opacity: 0.85;
        }
        .file-extra .file-meta-group {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
        }
        .file-extra .file-recipient { font-weight: 600; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-extra .file-total { margin-left: auto; white-space: nowrap; font-variant-numeric: tabular-nums; color: var(--text-light); }

        .file-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            width: 100%;
        }
        .action-buttons {
            display: inline-flex;
            gap: 6px;
            align-items: center;
        }

        .item-trash {
            padding: 4px 8px;
        }
        .item-trash i { font-size: 11px; }

        .file-meta {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 10px;
            color: var(--text-light);
        }

        .meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 10px;
            align-items: center;
        }

        .meta-item {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .meta-dot {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--text-light);
        }

        .meta-icon {
            width: 12px;
            height: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--text-light);
        }

        .meta-icon-success { color: var(--success); }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn:hover { background-color: var(--primary-hover); }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { background-color: var(--border); color: var(--text-light); cursor: not-allowed; }

        .btn-small { padding: 4px 8px; font-size: 11px; width: auto; margin: 0; background: none; color: var(--primary); }
        .btn-small:hover { background: var(--hover); }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover { background: var(--hover); }

        .download-btn {
            background: var(--hover);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 11px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .download-btn:hover { border-color: var(--primary); color: var(--primary); }
        .download-btn.downloaded { border-color: var(--success); color: var(--success); background: transparent; }

        .pdf-preview-trigger {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            border-radius: 999px;
            border: 1px solid transparent;
            margin-left: 4px;
            color: currentColor;
            opacity: 0.7;
            cursor: zoom-in;
        }
        .pdf-preview-trigger:hover {
            opacity: 1;
            border-color: currentColor;
        }
        .pdf-preview-trigger i { font-size: 11px; }

        .inline-notice {
            margin-top: 10px;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            color: var(--text-light);
            font-size: 11px;
            display: none;
            flex-direction: column;
            gap: 6px;
        }
        .inline-notice.visible { display: flex; }
        .inline-notice .notice-line {
            display: flex;
            align-items: flex-start;
            gap: 6px;
        }
        .inline-notice .notice-line i {
            margin-top: 1px;
            color: var(--text-light);
        }

        .footer {
            margin-top: 24px;
            text-align: center;
            font-size: 11px;
            color: var(--text-light);
            border-top: 1px solid var(--border);
            padding-top: 12px;
        }

        .footer a { color: var(--text-light); text-decoration: none; font-weight: 500; }
        .footer a:hover { color: var(--primary); }

        .error-toast {
            position: fixed;
            bottom: 16px; left: 16px; right: 16px;
            background: #ef4444; color: white; padding: 10px;
            border-radius: 8px; font-size: 12px; display: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            z-index: 100;
        }

        .preview-overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: rgba(15, 23, 42, 0.35);
            backdrop-filter: blur(6px);
            z-index: 200;
        }
        .preview-overlay.open { display: flex; animation: previewFade 0.18s ease; }

        .preview-card {
            width: min(92vw, 880px);
            max-height: 90vh;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.35);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: previewLift 0.2s ease;
        }
        :root[data-theme="dark"] .preview-card {
            background: rgba(15, 23, 42, 0.92);
        }

        .preview-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.35);
        }
        :root[data-theme="dark"] .preview-header {
            background: rgba(15, 23, 42, 0.35);
        }

        .preview-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 8px;
        }

        .preview-close {
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 12px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 999px;
            cursor: pointer;
        }
        .preview-close:hover { border-color: var(--primary); color: var(--primary); }

        .preview-body {
            padding: 12px;
            background: transparent;
        }

        .preview-iframe {
            width: 100%;
            height: 68vh;
            border: none;
            border-radius: 10px;
            background: var(--bg);
        }

        @keyframes previewFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes previewLift {
            from { transform: translateY(8px) scale(0.98); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-light); }
    </style>
</head>
<body>
    <div class="top-bar">
        <button id="settings-toggle" class="settings-btn" data-i18n="settingsButton" aria-expanded="false"></button>
    </div>

    <header>
        <div class="brand">
            <img class="brand-logo" src="icons/icon-64.png" data-i18n-attr="alt:appTitle">
            <div class="header-content">
                <h2 data-i18n="appTitle"></h2>
                <div class="subtitle" data-i18n="appSubtitle"></div>
            </div>
        </div>
    </header>

    <div class="privacy-note" data-i18n-html="privacyNoteHtml"></div>

    <section id="settings-panel" class="settings-panel" aria-hidden="true">
        <div class="setting-group-title" data-i18n="groupApp"></div>
        <div class="setting-item" id="display-mode-row">
            <div class="setting-label" data-i18n="settingDisplayMode"></div>
            <button type="button" class="toggle-pill" id="display-mode-toggle"></button>
        </div>
        <div class="setting-item">
            <div class="setting-label" data-i18n="settingTheme"></div>
            <button type="button" class="toggle-pill" id="theme-mode-toggle"></button>
        </div>
        <div class="setting-item">
            <div class="setting-label" data-i18n="settingLanguage"></div>
            <button type="button" class="toggle-pill" id="ui-language-toggle"></button>
        </div>

        <div class="setting-group-title" data-i18n="groupPdf"></div>
        <div class="setting-item">
            <div class="setting-label" data-i18n="settingPdfLanguage"></div>
            <button type="button" class="toggle-pill" id="pdf-language-toggle"></button>
        </div>
        <div class="setting-item">
            <div class="setting-label" data-i18n="settingPdfColor"></div>
            <input type="color" id="pdf-color-input" class="color-input" value="#2c3e50">
        </div>
        <div class="setting-item setting-stack">
            <div class="setting-head">
                <div class="setting-label" data-i18n="settingPdfLogo"></div>
                <div class="logo-controls">
                    <div id="pdf-logo-preview" class="logo-preview hidden"></div>
                    <button type="button" class="toggle-pill" id="pdf-logo-button"></button>
                    <button type="button" class="ghost-btn" id="pdf-logo-clear" data-i18n="pdfLogoRemove"></button>
                </div>
            </div>
            <input type="file" id="pdf-logo-input" accept="image/*">
        </div>

        <div class="setting-group-title" data-i18n="groupStorage"></div>
        <div class="setting-item setting-stack">
            <div class="setting-head">
                <div class="setting-label" data-i18n="settingRetention"></div>
                <div class="setting-value" id="retention-value"></div>
            </div>
            <input type="range" id="retention-range" class="range-input" min="0" max="32" step="1">
        </div>
    </section>

    <div id="main-view">
        <div id="upload-zone">
            <i class="fas fa-cloud-upload-alt icon-upload" aria-hidden="true"></i>
            <span class="upload-text" data-i18n="uploadText"></span>
            <span class="upload-hint" data-i18n="uploadHint"></span>
            <input type="file" id="fileInput" accept=".xml,.zip,application/zip,application/x-zip-compressed" multiple>
        </div>
        <div id="inline-notice" class="inline-notice" aria-live="polite"></div>

        <div id="detected-section" style="display:none">
            <div class="section-header">
                <div class="section-title" data-i18n="detectedTitle"></div>
                <button id="select-all-btn" class="btn-small" data-i18n="selectAll"></button>
            </div>
            <div class="file-list" id="detected-list"></div>
            <button id="convert-detected-btn" class="btn">
                <i class="fas fa-sync-alt" aria-hidden="true"></i>
                <span id="convert-btn-label"></span>
            </button>
        </div>

        <div id="results-section" style="display:none">
            <div class="section-header">
                <div class="section-title" data-i18n="resultsTitle"></div>
                <button id="clear-btn" class="btn-small" style="color:var(--text-light)" data-i18n="clearAll"></button>
            </div>
            <div class="file-list" id="results-list"></div>
            <button id="download-all-btn" class="btn">
                <i class="fas fa-file-archive" aria-hidden="true"></i>
                <span id="download-all-label" data-i18n="downloadAllZip"></span>
            </button>
        </div>
    </div>

    <div class="footer">
        <a href="https://aning.hr" target="_blank" data-i18n="footerLinkText"></a>
    </div>
    <div id="errorToast" class="error-toast"></div>

    <div id="preview-overlay" class="preview-overlay" aria-hidden="true">
        <div class="preview-card" role="dialog" aria-modal="true">
            <div class="preview-header">
                <div id="preview-title" class="preview-title"></div>
                <button type="button" id="preview-close" class="preview-close" aria-label="Close preview">&times;</button>
            </div>
            <div class="preview-body">
                <iframe id="preview-iframe" class="preview-iframe" title="PDF preview"></iframe>
            </div>
        </div>
    </div>

    <!-- Libraries -->
    <script src="./lib/jszip.min.js"></script>
    <script src="./lib/jspdf.umd.min.js"></script>
    <script src="./lib/jspdf.plugin.autotable.min.js"></script>

    <!-- Scripts -->
    <script src="invoice-parser.js"></script>
    <script src="pdf-generator.js"></script>
    <script src="popup.js"></script>
</body>
</html>
